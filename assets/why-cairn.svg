<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B949E"/>
    </marker>
  </defs>

  <rect width="1280" height="720" rx="16" fill="#0B0E14"/>

  <!-- title -->
  <text x="64" y="66" fill="#E6EDF3" font-size="27" font-weight="700">cairn · three pains, three repo-native answers</text>
  <text x="64" y="98" fill="#9DA7B3" font-size="15">markdown + git · no runtime · no database · no daemon — inject nothing, grep on demand</text>

  <!-- column captions -->
  <text x="64" y="150" fill="#6E7A8A" font-size="13" font-weight="700" letter-spacing="1">THE PAIN</text>
  <text x="732" y="150" fill="#6E7A8A" font-size="13" font-weight="700" letter-spacing="1">WHAT CAIRN DOES · the trail lives in the repo</text>

  <!-- ============ row 1 (blue) ============ -->
  <g>
    <rect x="64" y="166" width="520" height="128" rx="12" fill="#131A28" stroke="#4C8DFF" stroke-width="1.6"/>
    <text x="92" y="212" fill="#4C8DFF" font-size="30" font-weight="800">1</text>
    <text x="140" y="208" fill="#E6EDF3" font-size="21" font-weight="700">New chat, instant amnesia</text>
    <text x="140" y="240" fill="#9DA7B3" font-size="14.5">Context, conventions, last session's conclusion —</text>
    <text x="140" y="264" fill="#9DA7B3" font-size="14.5">all trapped in the previous conversation.</text>

    <line x1="596" y1="230" x2="712" y2="230" stroke="#8B949E" stroke-width="1.8" marker-end="url(#a)"/>

    <rect x="716" y="166" width="500" height="128" rx="12" fill="#131A28" stroke="#4C8DFF" stroke-width="1.6"/>
    <text x="744" y="206" fill="#E6EDF3" font-size="18" font-weight="700">Sessions die, the repo remembers</text>
    <text x="744" y="236" fill="#4C8DFF" font-size="15" font-family="ui-monospace,Consolas,monospace">tasks/INDEX.md · summary.md</text>
    <text x="744" y="264" fill="#9DA7B3" font-size="14">a new session greps it back (lexical hit = fast path)</text>
  </g>

  <!-- ============ row 2 (amber) ============ -->
  <g>
    <rect x="64" y="310" width="520" height="128" rx="12" fill="#131A28" stroke="#E3A008" stroke-width="1.6"/>
    <text x="92" y="356" fill="#E3A008" font-size="30" font-weight="800">2</text>
    <text x="140" y="352" fill="#E6EDF3" font-size="21" font-weight="700">Lost mid-task</text>
    <text x="140" y="384" fill="#9DA7B3" font-size="14.5">"Where was I?" has nowhere to live; a pointer</text>
    <text x="140" y="408" fill="#9DA7B3" font-size="14.5">file goes stale in two weeks and misleads.</text>

    <line x1="596" y1="374" x2="712" y2="374" stroke="#8B949E" stroke-width="1.8" marker-end="url(#a)"/>

    <rect x="716" y="310" width="500" height="128" rx="12" fill="#131A28" stroke="#E3A008" stroke-width="1.6"/>
    <text x="744" y="350" fill="#E6EDF3" font-size="18" font-weight="700">State lives on the task, updated at wrap-up</text>
    <text x="744" y="380" fill="#E3A008" font-size="15" font-family="ui-monospace,Consolas,monospace">progress.md + INDEX 🚧</text>
    <text x="744" y="408" fill="#9DA7B3" font-size="14">grep "^- 🚧" for all in-flight; doctor catches drift</text>
  </g>

  <!-- ============ row 3 (green) ============ -->
  <g>
    <rect x="64" y="454" width="520" height="128" rx="12" fill="#131A28" stroke="#3FB950" stroke-width="1.6"/>
    <text x="92" y="500" fill="#3FB950" font-size="30" font-weight="800">3</text>
    <text x="140" y="496" fill="#E6EDF3" font-size="21" font-weight="700">Same landmine, twice</text>
    <text x="140" y="528" fill="#9DA7B3" font-size="14.5">You / a teammate / another AI session</text>
    <text x="140" y="552" fill="#9DA7B3" font-size="14.5">step on it again.</text>

    <line x1="596" y1="518" x2="712" y2="518" stroke="#8B949E" stroke-width="1.8" marker-end="url(#a)"/>

    <rect x="716" y="454" width="500" height="128" rx="12" fill="#131A28" stroke="#3FB950" stroke-width="1.6"/>
    <text x="744" y="494" fill="#E6EDF3" font-size="18" font-weight="700">Pitfalls + SOPs, first-class</text>
    <text x="744" y="524" fill="#3FB950" font-size="15" font-family="ui-monospace,Consolas,monospace">spec/pitfalls.md · sop/</text>
    <text x="744" y="552" fill="#9DA7B3" font-size="14">grep history before acting, reuse the hit</text>
  </g>

  <!-- footer -->
  <line x1="64" y1="628" x2="1216" y2="628" stroke="#1C2430" stroke-width="1"/>
  <text x="64" y="664" fill="#9DA7B3" font-size="15" font-weight="600">Knowledge levels up too: wrap-up promotes task lessons into SOPs / decisions / rules — not a file dump.</text>
  <text x="64" y="694" fill="#6E7A8A" font-size="13">github.com/hjxccc/cairn · a few hundred lines of greppable text is the whole memory system — that's the point</text>
</svg>
