<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="660" viewBox="0 0 1040 660" font-family="ui-monospace,'Cascadia Code',Consolas,'SF Mono',Menlo,monospace">
  <rect width="1040" height="660" rx="14" fill="#0B0E14"/>

  <!-- terminal chrome -->
  <rect x="24" y="24" width="992" height="612" rx="10" fill="#0F1420" stroke="#1C2430" stroke-width="1"/>
  <circle cx="52" cy="52" r="6" fill="#FF5F56"/>
  <circle cx="72" cy="52" r="6" fill="#FFBD2E"/>
  <circle cx="92" cy="52" r="6" fill="#27C93F"/>
  <text x="120" y="57" fill="#6E7A8A" font-size="13">your-project — one full cairn loop</text>
  <line x1="24" y1="72" x2="1016" y2="72" stroke="#1C2430" stroke-width="1"/>

  <!-- 1 start -->
  <text x="48" y="112" fill="#4C8DFF" font-size="15" font-weight="700">1</text>
  <text x="72" y="112" fill="#6E7A8A" font-size="13.5"># start a task: one command builds the dated dir and drops you in its scratch/</text>
  <text x="72" y="138" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> cd "$(.cairn/scripts/mktmp.sh login-timeout)"</text>
  <text x="72" y="162" fill="#9DA7B3" font-size="13.5">→ .cairn/tasks/07-15-login-timeout/scratch/</text>

  <!-- 2 work -->
  <text x="48" y="212" fill="#E3A008" font-size="15" font-weight="700">2</text>
  <text x="72" y="212" fill="#6E7A8A" font-size="13.5"># two hours of debugging: scripts / screenshots / dumps all land in scratch, root stays clean</text>
  <text x="72" y="238" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> ls</text>
  <text x="72" y="262" fill="#9DA7B3" font-size="13.5">probe.py   gateway-429s.png   pending_dump.csv</text>
  <text x="560" y="262" fill="#E3A008" font-size="13">← one place, never scattered (hook guards the root)</text>

  <!-- 3 wrap up -->
  <text x="48" y="312" fill="#3FB950" font-size="15" font-weight="700">3</text>
  <text x="72" y="312" fill="#6E7A8A" font-size="13.5"># wrap up: a one-line conclusion onto INDEX (scratch stays with the task, out of git)</text>
  <text x="72" y="338" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> head -1 .cairn/tasks/INDEX.md</text>
  <text x="72" y="362" fill="#E3A008" font-size="13">- 07-15-login-timeout — our replay cron had no backoff = retry storm; added cap+jitter [timeout]</text>

  <!-- 4 recall -->
  <text x="48" y="412" fill="#A371F7" font-size="15" font-weight="700">4</text>
  <text x="72" y="412" fill="#6E7A8A" font-size="13.5"># 3 weeks later · new session / a teammate / another agent — one grep brings it back</text>
  <text x="72" y="438" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> grep -i timeout .cairn/tasks/INDEX.md</text>
  <text x="72" y="462" fill="#E3A008" font-size="13">- 07-15-login-timeout — …retry storm…cap+jitter</text>
  <text x="620" y="462" fill="#3FB950" font-size="13">← found in seconds, reuse it, don't re-step</text>

  <!-- payoff strip -->
  <line x1="48" y1="512" x2="992" y2="512" stroke="#1C2430" stroke-width="1"/>
  <text x="48" y="548" fill="#E6EDF3" font-size="14.5" font-weight="700">one command to start · mess stays in scratch · wrap to one line · one grep brings it back later</text>
  <text x="48" y="578" fill="#9DA7B3" font-size="13">The whole "project memory" is greppable plain text — no runtime, no database, no state machine that expires.</text>
  <text x="48" y="608" fill="#6E7A8A" font-size="12.5">github.com/hjxccc/cairn</text>
</svg>
