<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect width="1040" height="600" rx="14" fill="#0B0E14"/>

  <!-- window chrome -->
  <rect x="24" y="24" width="992" height="552" rx="10" fill="#0F1420" stroke="#1C2430" stroke-width="1"/>
  <circle cx="52" cy="52" r="6" fill="#FF5F56"/>
  <circle cx="72" cy="52" r="6" fill="#FFBD2E"/>
  <circle cx="92" cy="52" r="6" fill="#27C93F"/>
  <text x="120" y="57" fill="#9DA7B3" font-size="14" font-weight="600">you just do the work — the trail is left automatically, one search brings it back</text>
  <line x1="24" y1="72" x2="1016" y2="72" stroke="#1C2430" stroke-width="1"/>

  <!-- 1 start -->
  <circle cx="60" cy="108" r="13" fill="#4C8DFF"/>
  <text x="60" y="113" fill="#0B0E14" font-size="14" font-weight="800" text-anchor="middle">1</text>
  <text x="88" y="106" fill="#E6EDF3" font-size="16" font-weight="700">Start a task</text>
  <text x="88" y="132" fill="#9DA7B3" font-size="14">a dated dir <tspan fill="#7FB0FF" font-family="ui-monospace,Consolas,monospace">07-15-login-timeout/</tspan> and its scratch/ are created for you — no deciding where temp files go</text>

  <!-- 2 work -->
  <circle cx="60" cy="192" r="13" fill="#E3A008"/>
  <text x="60" y="197" fill="#0B0E14" font-size="14" font-weight="800" text-anchor="middle">2</text>
  <text x="88" y="190" fill="#E6EDF3" font-size="16" font-weight="700">Two hours of debugging — the mess files itself</text>
  <text x="88" y="216" fill="#9DA7B3" font-size="14" font-family="ui-monospace,Consolas,monospace">scratch/  ·  probe.py   gateway-429s.png   pending_dump.csv</text>
  <text x="88" y="240" fill="#E3A008" font-size="13.5">scripts / screenshots / dumps all land in scratch — repo root stays clean (the hook guards it)</text>

  <!-- 3 wrap up -->
  <circle cx="60" cy="300" r="13" fill="#3FB950"/>
  <text x="60" y="305" fill="#0B0E14" font-size="14" font-weight="800" text-anchor="middle">3</text>
  <text x="88" y="298" fill="#E6EDF3" font-size="16" font-weight="700">Wrap up: a one-line conclusion onto INDEX</text>
  <text x="88" y="324" fill="#9DA7B3" font-size="13">(scratch stays with the task, out of git)</text>
  <rect x="88" y="338" width="884" height="34" rx="6" fill="#131A28" stroke="#E3A008" stroke-width="1.2"/>
  <text x="104" y="360" fill="#E3A008" font-size="13.5" font-family="ui-monospace,Consolas,monospace">- 07-15-login-timeout — our replay cron had no backoff = retry storm; added cap+jitter</text>

  <!-- 4 recall -->
  <circle cx="60" cy="416" r="13" fill="#A371F7"/>
  <text x="60" y="421" fill="#0B0E14" font-size="14" font-weight="800" text-anchor="middle">4</text>
  <text x="88" y="414" fill="#E6EDF3" font-size="16" font-weight="700">3 weeks later · new session / a teammate / another agent</text>
  <text x="88" y="440" fill="#9DA7B3" font-size="14">search "timeout" and the line comes back <tspan fill="#3FB950" font-weight="700">→ found in seconds, reuse it, don't re-step</tspan></text>

  <!-- payoff strip -->
  <line x1="48" y1="486" x2="992" y2="486" stroke="#1C2430" stroke-width="1"/>
  <text x="48" y="522" fill="#E6EDF3" font-size="15" font-weight="700">nothing to decide where things go · the mess auto-files · wrap to one line · one search brings it back</text>
  <text x="48" y="550" fill="#9DA7B3" font-size="13.5">the whole "project memory" is searchable plain text — no runtime, no database, no state machine that expires.</text>
</svg>
