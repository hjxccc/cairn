<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="660" viewBox="0 0 1040 660" font-family="ui-monospace,'Cascadia Code',Consolas,'PingFang SC','Microsoft YaHei','Noto Sans SC',monospace">
  <rect width="1040" height="660" rx="14" fill="#0B0E14"/>

  <!-- terminal chrome -->
  <rect x="24" y="24" width="992" height="612" rx="10" fill="#0F1420" stroke="#1C2430" stroke-width="1"/>
  <circle cx="52" cy="52" r="6" fill="#FF5F56"/>
  <circle cx="72" cy="52" r="6" fill="#FFBD2E"/>
  <circle cx="92" cy="52" r="6" fill="#27C93F"/>
  <text x="120" y="57" fill="#6E7A8A" font-size="13">your-project — cairn 一次完整循环</text>
  <line x1="24" y1="72" x2="1016" y2="72" stroke="#1C2430" stroke-width="1"/>

  <!-- ① start -->
  <text x="48" y="112" fill="#4C8DFF" font-size="15" font-weight="700">①</text>
  <text x="76" y="112" fill="#6E7A8A" font-size="13.5"># 起个任务：一条命令，建好日期目录并进入它的 scratch/</text>
  <text x="76" y="138" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> cd "$(.cairn/scripts/mktmp.sh login-timeout)"</text>
  <text x="76" y="162" fill="#9DA7B3" font-size="13.5">→ .cairn/tasks/07-15-login-timeout/scratch/</text>

  <!-- ② work -->
  <text x="48" y="212" fill="#E3A008" font-size="15" font-weight="700">②</text>
  <text x="76" y="212" fill="#6E7A8A" font-size="13.5"># 排查两小时：调试脚本 / 截图 / dump 全丢进 scratch，根目录保持干净</text>
  <text x="76" y="238" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> ls</text>
  <text x="76" y="262" fill="#9DA7B3" font-size="13.5">probe.py   gateway-429s.png   pending_dump.csv</text>
  <text x="560" y="262" fill="#E3A008" font-size="13">← 脏活集中一处，不散落全仓（hook 拦根目录）</text>

  <!-- ③ wrap up -->
  <text x="48" y="312" fill="#3FB950" font-size="15" font-weight="700">③</text>
  <text x="76" y="312" fill="#6E7A8A" font-size="13.5"># 收尾：一句话结论垒进 INDEX（scratch 随任务留在原地，不进 git）</text>
  <text x="76" y="338" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> head -1 .cairn/tasks/INDEX.md</text>
  <text x="76" y="362" fill="#E3A008" font-size="13.5">- 07-15-login-timeout — 自家 replay cron 无退避=重试风暴；加 cap+jitter [超时][重试]</text>

  <!-- ④ recall -->
  <text x="48" y="412" fill="#A371F7" font-size="15" font-weight="700">④</text>
  <text x="76" y="412" fill="#6E7A8A" font-size="13.5"># 三周后 · 新会话 / 另一个人 / 另一个 agent —— 一条 grep 就捞回</text>
  <text x="76" y="438" fill="#E6EDF3" font-size="14"><tspan fill="#27C93F">$</tspan> grep -i 超时 .cairn/tasks/INDEX.md</text>
  <text x="76" y="462" fill="#E3A008" font-size="13.5">- 07-15-login-timeout — …重试风暴…加 cap+jitter</text>
  <text x="640" y="462" fill="#3FB950" font-size="13">← 秒查到，直接复用，不重踩</text>

  <!-- payoff strip -->
  <line x1="48" y1="512" x2="992" y2="512" stroke="#1C2430" stroke-width="1"/>
  <text x="48" y="548" fill="#E6EDF3" font-size="15" font-weight="700">起任务一条命令 · 脏活进 scratch 不散落 · 收尾垒一行 · 以后一条 grep 捞回</text>
  <text x="48" y="578" fill="#9DA7B3" font-size="13.5">整个"项目记忆"就是可 grep 的纯文本 —— 没有运行时、没有数据库、没有会过期的状态机。</text>
  <text x="48" y="608" fill="#6E7A8A" font-size="12.5">github.com/hjxccc/cairn</text>
</svg>
